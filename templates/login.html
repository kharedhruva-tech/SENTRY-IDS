<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN // SENTRY-IDS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card glass-panel">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fas fa-shield-halved"></i>
            </div>
            <h1 class="auth-title">SENTRY // IDS</h1>
            <p class="auth-subtitle">Intrusion Detection System Security Console</p>
        </div>
        
        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert-banner alert-banner-{% if category == 'error' %}error{% else %}success{% endif %}">
                        <i class="fas {% if category == 'error' %}fa-triangle-exclamation{% else %}fa-circle-check{% endif %}"></i>
                        <span>{{ message }}</span>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="username">Operator Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="e.g. admin" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Security Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">
                <i class="fas fa-key"></i> Authenticate Console
            </button>
        </form>
        
        <div class="auth-footer">
            <p>New operator? <a href="{{ url_for('register_page') }}">Register credentials</a></p>
        </div>
    </div>
</body>
</html>
